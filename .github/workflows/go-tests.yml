name: go-deployment-test

on:
  workflow_dispatch:
  push: 
    paths:
      - '**.go'
      - '!**.yml'
      - '!**.md'
  pull_request:
    paths:
      - '**.go'
      - '!**.yml'
      - '!**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.24'
          check-latest: true
          cache: true
      - name: Setup Docker container
        run: ./scripts/build.sh
      - name: Starting test Docker container instance
        run: make start-test
      - name: Docker debugging
        run: |
          connection=false
          for i in {1..5}; do
              out=$(curl -k https://127.0.0.1:5000)
              if [[ "$out" =~ "success" ]]; then
                  connection=true
                  break
              fi
              sleep 1
          done
          if [[ "$connection" == "false" ]]; then
              echo "error: failed to establish connection to server"
              exit 1
          fi
      - name: Build and test Go
        run: |
          cp "sample-config.yml" "./src/config/config.yml"
          go mod download
          go test ./...
