name: go-deployment-test

on:
  workflow_dispatch:
  push: 
    paths:
      - '**.go'
      - '!**.yml'
      - '!**.md'
  pull_request:
    paths:
      - '**.go'
      - '!**.yml'
      - '!**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.24'
          check-latest: true
          cache: true
      - name: Setup Docker container and files
        run: ./scripts/build.sh
      - name: Starting test Docker container instance
        run: make start-test
      - name: Docker debugging
        run: |
          docker ps -a
          sleep 3
          docker logs python-fs
      - name: Build and test Go
        run: |
          cp "sample-config.yml" "./src/config/config.yml"
          go mod download
          go test ./...
